general {
    gaps_in = 2
    gaps_out = 5

    border_size = 0

    col.active_border = rgb(787c99)
    col.inactive_border = rgba(0a0a0ddb)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle

    no_focus_fallback = true

    snap {
        enabled = true
        window_gap = 15
    }
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    special_scale_factor = 0.95
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_on_top = true
    new_status = master
    special_scale_factor = 0.95
}

group {
    col.border_active = 0x00000000
    col.border_inactive = 0x00000000

    groupbar {
        font_weight_active = bold
        font_weight_inactive = bold
        gradients = true
        font_size = 14
        height = 24
        gradient_rounding = 10
        text_color = rgb(acb0d0)
        col.active =0xE6080B00
        col.inactive =0xB3080B00
        indicator_height = 0
        indicator_gap = 2
        keep_upper_gap = false
    }
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_autoreload = true
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    enable_anr_dialog = false
    focus_on_activate = true
    on_focus_under_fullscreen = 1
    vrr = 2
}

decoration {
    rounding = 15
    # dim_inactive = true
    # dim_strength = 0.2

    blur {
        enabled = false
        passes = 1
    }
    
    shadow {
        enabled = false 
    }
}

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = br,us
    kb_variant =
    kb_model =
    kb_options = grp:alt_space_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

gestures {
    workspace_swipe_distance = 1000
    workspace_swipe_min_speed_to_force = 1000
    workspace_swipe_direction_lock = false
    workspace_swipe_create_new = false
    workspace_swipe_cancel_ratio = 0.1
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

xwayland {
    enabled = true
    force_zero_scaling = true
}

binds {
    workspace_back_and_forth = true
    hide_special_on_workspace_change = true
    movefocus_cycles_fullscreen = true
}

render {
    new_render_scheduling = true
    # direct_scanout = true
    cm_enabled = true
    send_content_type = false
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}